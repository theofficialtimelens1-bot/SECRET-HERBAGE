<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout | Secret Herbage</title>
  <style>
    body { background-color: #f3f2e8; color: #1d3c28; font-family: 'Playfair Display', serif; padding: 50px 6%; }
    .grid { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 50px; }
    h2 { text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #1d3c28; padding-bottom: 10px; }
    input, textarea { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #1d3c28; background: transparent; }
    .summary { background: #1d3c28; color: #f3f2e8; padding: 40px; border-radius: 5px; }
    .row { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
    .order-btn { width: 100%; background: #f3f2e8; color: #1d3c28; border: none; padding: 20px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 16px; }
    .order-btn:hover { background: #e6683c; color: white; }
    #discount-msg { display: none; color: #ffcc00; font-weight: bold; font-size: 14px; margin-bottom: 10px; }
  </style>
</head>
<body>

  <div class="grid">
    <!-- Form Side -->
    <div>
      <h2>Billing Details</h2>
      <form id="orderForm" action="https://formspree.io/f/mgorkgpa" method="POST">
        <input type="text" name="Name" placeholder="Full Name" required>
        <input type="text" name="Phone" placeholder="WhatsApp Number" required>
        <textarea name="Address" placeholder="Home Address" rows="4" required></textarea>
        <input type="text" name="City" placeholder="City" required>
        
        <!-- Hidden data for your Email -->
        <input type="hidden" name="Items" id="h-items">
        <input type="hidden" name="Total Bill" id="h-total">
        <input type="hidden" name="Status" id="h-status">
        
        <button type="submit" class="order-btn">Complete Order (COD)</button>
      </form>
    </div>

    <!-- Summary Side -->
    <div class="summary">
      <h2>Order Summary</h2>
      <div id="discount-msg">🎉 50% WINNER DISCOUNT APPLIED!</div>
      
      <div class="row"><span>Product:</span><span>Pulling Oil (BOGO)</span></div>
      <div class="row"><span>Quantity:</span><span id="qty-display">0</span></div>
      
      <div class="row" style="font-size:28px; font-weight:bold; border:none; margin-top:20px;">
        <span>Total:</span>
        <span id="total-display">Rs. 0</span>
      </div>
      <p style="font-size:12px; opacity:0.8;">* Free Shipping All Over Pakistan</p>
    </div>
  </div>

  <script>
    function processOrder() {
        let count = parseInt(localStorage.getItem('sh_cart_count') || 1);
        // Check if user won the game
        let hasWon = localStorage.getItem('sh_game_won') === 'true';
        
        let pricePerUnit = 2400; // Normal Price
        let statusText = "Normal Customer (Full Price)";

        if (hasWon) {
            pricePerUnit = 1200; // 50% Off Price
            statusText = "GAME WINNER (50% OFF Applied)";
            document.getElementById('discount-msg').style.display = 'block';
        }

        let finalTotal = count * pricePerUnit;

        // Display on UI
        document.getElementById('qty-display').innerText = count;
        document.getElementById('total-display').innerText = "Rs. " + finalTotal;

        // Fill Hidden Fields for Email
        document.getElementById('h-items').value = count + " x Pulling Oil Packs";
        document.getElementById('h-total').value = "Rs. " + finalTotal;
        document.getElementById('h-status').value = statusText;
    }

    // FORM SUBMIT HONE PAR DISCOUNT KHATAM KARDO
    document.getElementById('orderForm').onsubmit = function() {
        localStorage.setItem('sh_game_won', 'false'); // Discount Expired for next time
        // localStorage.setItem('sh_cart_count', '0'); // Optional: Cart clear karna ho toh
    };

    window.onload = processOrder;
  </script>
</body>
</html>
