<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout | Secret Herbage</title>
  <style>
    body { background-color: #f3f2e8; color: #1d3c28; font-family: 'Playfair Display', serif; padding: 50px 6%; }
    .grid { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 50px; }
    input, textarea { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #1d3c28; background: transparent; }
    .summary { background: #1d3c28; color: #f3f2e8; padding: 40px; }
    .row { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
    .order-btn { width: 100%; background: #f3f2e8; color: #1d3c28; border: none; padding: 20px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="grid">
    <div>
      <h2>Billing Details</h2>
      <form action="https://formspree.io/f/mgorkgpa" method="POST">
        <input type="text" name="Name" placeholder="Full Name" required>
        <input type="text" name="Phone" placeholder="WhatsApp Number" required>
        <textarea name="Address" placeholder="Home Address" rows="4" required></textarea>
        <input type="text" name="City" placeholder="City" required>
        
        <!-- Order Data Hidden Fields -->
        <input type="hidden" name="Items" id="h-items">
        <input type="hidden" name="Total Bill" id="h-total">
        
        <button type="submit" class="order-btn">Place Order (Cash on Delivery)</button>
      </form>
    </div>
    <div class="summary">
      <h2>Order Summary</h2>
      <div class="row"><span>Product:</span><span>Pulling Oil (BOGO)</span></div>
      <div class="row"><span>Quantity:</span><span id="qty">0</span></div>
      <div class="row" style="color:#ffcc00;"><span>Discount:</span><span>50% OFF Applied</span></div>
      <div class="row" style="font-size:24px; font-weight:bold; border:none;"><span>Total:</span><span id="total">Rs. 0</span></div>
      <p>* Free Delivery all over Pakistan</p>
    </div>
  </div>
  <script>
    let count = localStorage.getItem('sh_cart_count') || 1;
    let finalTotal = count * 1200; // Rs. 2400 per pack, so 50% discount logic as per your request
    document.getElementById('qty').innerText = count;
    document.getElementById('total').innerText = "Rs. " + finalTotal;
    document.getElementById('h-items').value = count + " x Pulling Oil Packs";
    document.getElementById('h-total').value = "Rs. " + finalTotal;
  </script>
</body>
</html>
