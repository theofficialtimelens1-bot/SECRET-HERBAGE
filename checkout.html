<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout | Secret Herbage</title>
  <style>
    body { background-color: #f3f2e8; color: #1d3c28; font-family: 'Playfair Display', serif; padding: 50px 6%; }
    .grid { max-width: 900px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
    input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #1d3c28; background: transparent; }
    .summary { background: #1d3c28; color: #f3f2e8; padding: 30px; border-radius: 10px; }
  </style>
</head>
<body>
  <div id="main-checkout" class="grid">
    <form id="orderForm">
      <h2>Billing</h2>
      <input type="text" name="Name" placeholder="Full Name" required>
      <input type="text" name="Phone" placeholder="WhatsApp" required>
      <input type="text" name="Address" placeholder="Address" required>
      <input type="hidden" name="Total Bill" id="h-total">
      <input type="hidden" name="Discount Status" id="h-status">
      <button type="submit" id="s-btn" style="width:100%; padding:15px; cursor:pointer; background:#f3f2e8; font-weight:bold;">PLACE ORDER</button>
    </form>
    <div class="summary">
      <h2>Order Summary</h2>
      <p id="d-msg" style="display:none; color:#ffcc00;">🎉 50% OFF APPLIED</p>
      <h1 id="total-display">Rs. 2,400</h1>
    </div>
  </div>
  <div id="thank-you" style="display:none; text-align:center;"><h1>Order Placed!</h1><a href="index.html">Back Home</a></div>

  <script>
    window.onload = () => {
      let price = (localStorage.getItem('sh_discount_unlocked') === 'true') ? 1200 : 2400;
      if(price === 1200) document.getElementById('d-msg').style.display = "block";
      document.getElementById('total-display').innerText = "Rs. " + price;
      document.getElementById('h-total').value = "Rs. " + price;
      document.getElementById('h-status').value = (price === 1200) ? "GAME WINNER" : "NORMAL";
    };

    document.getElementById('orderForm').onsubmit = async (e) => {
      e.preventDefault();
      const btn = document.getElementById('s-btn');
      btn.innerText = "Processing...";
      
      const res = await fetch("https://formspree.io/f/mgorkgpa", {
        method: 'POST', body: new FormData(e.target), headers: { 'Accept': 'application/json' }
      });

      if (res.ok) {
        // RESET EVERYTHING AFTER ORDER
        localStorage.removeItem('sh_discount_unlocked');
        localStorage.setItem('sh_cart_count', 0);
        document.getElementById('main-checkout').style.display = 'none';
        document.getElementById('thank-you').style.display = 'block';
      }
    };
  </script>
</body>
</html>
