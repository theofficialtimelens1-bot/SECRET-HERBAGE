<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout | Secret Herbage</title>
  <style>
    body { background-color: #f3f2e8; color: #1d3c28; font-family: 'Playfair Display', serif; padding: 50px 6%; }
    .grid { max-width: 1000px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 50px; }
    h2 { text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #1d3c28; padding-bottom: 10px; }
    input, textarea { width: 100%; padding: 15px; margin-bottom: 15px; border: 1px solid #1d3c28; background: transparent; color: #1d3c28; font-size: 14px; }
    .summary { background: #1d3c28; color: #f3f2e8; padding: 40px; border-radius: 5px; height: fit-content; }
    .row { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
    .order-btn { width: 100%; background: #f3f2e8; color: #1d3c28; border: none; padding: 20px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 16px; transition: 0.3s; }
    .order-btn:hover { background: #e6683c; color: white; }
    #discount-msg { display: none; color: #ffcc00; font-weight: bold; font-size: 16px; margin-bottom: 15px; border: 1px dashed #ffcc00; padding: 10px; text-align: center; }

    /* THANK YOU MESSAGE STYLES */
    #thank-you-area { display: none; text-align: center; padding: 40px; }
    #thank-you-area h1 { font-size: 40px; margin-bottom: 20px; }
    .back-home { display: inline-block; margin-top: 20px; color: #1d3c28; text-decoration: underline; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>

  <!-- Main Checkout Area -->
  <div id="checkout-main-area" class="grid">
    <div>
      <h2>Billing Details</h2>
      <form id="orderForm">
        <input type="text" name="Name" placeholder="Full Name" required>
        <input type="text" name="Phone" placeholder="WhatsApp Number" required>
        <textarea name="Address" placeholder="Home Address" rows="4" required></textarea>
        <input type="text" name="City" placeholder="City" required>
        
        <input type="hidden" name="Items" id="h-items">
        <input type="hidden" name="Total Bill" id="h-total">
        <input type="hidden" name="Status" id="h-status">
        
        <button type="submit" class="order-btn" id="submit-btn">Place Order (Cash on Delivery)</button>
        <p id="form-status" style="margin-top:15px; font-weight:bold;"></p>
      </form>
    </div>

    <div class="summary">
      <h2>Order Summary</h2>
      <div id="discount-msg">🎉 50% GAME WINNER DISCOUNT APPLIED!</div>
      <div class="row"><span>Product:</span><span>Pulling Oil (BOGO Pack)</span></div>
      <div class="row"><span>Quantity:</span><span id="qty-display">0</span></div>
      <div class="row" style="font-size:28px; font-weight:bold; border:none; margin-top:20px;">
        <span>Total:</span>
        <span id="total-display">Rs. 0</span>
      </div>
      <p id="pricing-type" style="font-size:12px; opacity:0.8;">* Standard Price Applied</p>
    </div>
  </div>

  <!-- Success Message Area -->
  <div id="thank-you-area">
    <h1>Thank you for ordering!</h1>
    <p>Your order has been received. We will contact you on WhatsApp soon for confirmation.</p>
    <a href="index.html" class="back-home">Back to Homepage</a>
  </div>

  <script>
    // 1. DATA LOAD KARNA
    function loadData() {
        const count = parseInt(localStorage.getItem('sh_cart_count') || 1);
        const hasWon = localStorage.getItem('sh_game_won');
        
        let pricePerUnit = 2400;
        let statusText = "Standard Customer";

        if (hasWon === 'true') {
            pricePerUnit = 1200;
            statusText = "GAME WINNER (50% OFF)";
            document.getElementById('discount-msg').style.display = 'block';
            document.getElementById('pricing-type').innerText = "* Winner Discount Applied!";
        }

        const total = count * pricePerUnit;
        document.getElementById('qty-display').innerText = count;
        document.getElementById('total-display').innerText = "Rs. " + total;
        document.getElementById('h-items').value = count + " x Pulling Oil Packs";
        document.getElementById('h-total').value = "Rs. " + total;
        document.getElementById('h-status').value = statusText;
    }

    // 2. FORM SUBMIT HANDLE KARNA (AJAX)
    const form = document.getElementById("orderForm");
    
    async function handleSubmit(event) {
      event.preventDefault();
      const status = document.getElementById("form-status");
      const btn = document.getElementById("submit-btn");
      const data = new FormData(event.target);

      btn.disabled = true;
      btn.innerText = "Processing...";

      fetch("https://formspree.io/f/mgorkgpa", {
        method: 'POST',
        body: data,
        headers: { 'Accept': 'application/json' }
      }).then(response => {
        if (response.ok) {
          // Success!
          localStorage.removeItem('sh_game_won'); // Reset Discount
          localStorage.setItem('sh_cart_count', '0'); // Clear Cart
          
          document.getElementById('checkout-main-area').style.display = 'none'; // Hide Form
          document.getElementById('thank-you-area').style.display = 'block'; // Show Thank You
        } else {
          response.json().then(data => {
            if (Object.hasOwn(data, 'errors')) {
              status.innerHTML = data["errors"].map(error => error["message"]).join(", ");
            } else {
              status.innerHTML = "Oops! There was a problem submitting your form";
            }
            btn.disabled = false;
            btn.innerText = "Place Order (Cash on Delivery)";
          })
        }
      }).catch(error => {
        status.innerHTML = "Oops! There was a problem connecting to the server";
        btn.disabled = false;
        btn.innerText = "Place Order (Cash on Delivery)";
      });
    }

    form.addEventListener("submit", handleSubmit);
    window.onload = loadData;
  </script>
</body>
</html>
