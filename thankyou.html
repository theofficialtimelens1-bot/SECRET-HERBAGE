<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Thank You | Secret Herbage</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    body { background: #f3f2e8; color: #1d3c28; font-family: 'Playfair Display', serif; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
    .card { animation: pop 0.8s ease; }
    @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    h1 { font-size: 80px; font-weight: 900; margin-bottom: 20px; }
    p { font-family: 'Montserrat', sans-serif; font-size: 20px; opacity: 0.7; margin-bottom: 40px; }
    .btn { text-decoration: none; color: #1d3c28; font-weight: bold; border-bottom: 3px solid #1d3c28; font-size: 18px; text-transform: uppercase; letter-spacing: 5px; }
  </style>
</head>
<body>
  <div class="card">
    <i class="fas fa-crown" style="font-size: 60px; margin-bottom: 20px;"></i>
    <h1>Thank You.</h1>
    <p>Your order is confirmed. We will contact you via WhatsApp shortly!</p>
    <a href="index.html" class="btn">Back to Home</a>
  </div>
</body>
</html>
